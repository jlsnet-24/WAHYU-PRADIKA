<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>For You 💜</title>

<link href="https://fonts.googleapis.com/css2?family=Great+Vibes&family=Poppins:wght@300;400&display=swap" rel="stylesheet">

<style>
body {
    margin: 0;
    font-family: 'Poppins', sans-serif;
    background: linear-gradient(135deg, #f3ecff, #dcccff);
}

/* OPENING */
.opening {
    position: fixed;
    width: 100%;
    height: 100%;
    background: #2e1a47;
    display: flex;
    justify-content: center;
    align-items: center;
    flex-direction: column;
    color: white;
}

button {
    margin-top: 20px;
    padding: 12px 28px;
    border: none;
    border-radius: 25px;
    background: #b999ff;
    color: white;
    cursor: pointer;
}

/* MAIN */
.main {
    display: none;
    height: 100vh;
    justify-content: center;
    align-items: center;
}

.card {
    width: 330px;
    background: white;
    border-radius: 20px;
    padding: 25px;
    text-align: center;
}

/* TEXT */
.title {
    font-family: 'Great Vibes', cursive;
    font-size: 34px;
    color: #5a2ea6;
}

.photo img {
    width: 140px;
    height: 140px;
    border-radius: 15px;
    margin: 15px 0;
}

.name {
    font-weight: bold;
    color: #6a3cc9;
}

.message {
    font-size: 13px;
    line-height: 1.7;
}
</style>
</head>

<body>

<!-- OPENING -->
<div class="opening" id="open">
    <h1>For Someone Special 💜</h1>
    <button onclick="playMusic()">Buka</button>
</div>

<!-- MAIN -->
<div class="main" id="main">
    <div class="card">

        <div class="title">Happy Semprotulation</div>

        <div class="photo">
            <img src="https://i.ibb.co/HfMmR3Fx/image.jpg">
        </div>

        <div class="name">WAHYU PRADIKA</div>

        <div class="message">
            Hari ini bukan sekadar tentang pencapaian,<br><br>
            tapi tentang perjalanan luar biasa yang akhirnya menemukan titik terangnya.<br><br>
            Kamu hebat dan layak untuk semua ini ✨
        </div>

        <div style="margin-top:15px;font-size:12px;">
            Dari: <b>Nama Kamu</b>
        </div>

    </div>
</div>

<!-- AUDIO GOOGLE DRIVE -->
<audio id="musik" loop>
    <source src="https://docs.google.com/uc?export=open&id=1cKXUyZkmDsCCNwid94kTNnwhiLnr4v0s" type="audio/mpeg">
</audio>

<script>
function playMusic() {
    let audio = document.getElementById("musik");

    document.getElementById("open").style.display = "none";
    document.getElementById("main").style.display = "flex";

    audio.volume = 0.5;

    audio.play().then(() => {
        console.log("musik jalan");
    }).catch(() => {
        alert("Klik sekali lagi untuk memutar musik");
        document.body.onclick = function() {
            audio.play();
        }
    });
}
</script>

</body>
</html>
