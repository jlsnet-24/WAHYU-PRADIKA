<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>For You 💜</title>

<link href="https://fonts.googleapis.com/css2?family=Great+Vibes&family=Poppins:wght@300;400&display=swap" rel="stylesheet">

<style>
body {
    margin: 0;
    font-family: 'Poppins', sans-serif;
    background: linear-gradient(135deg, #f3ecff, #dcccff);
    overflow: hidden;
}

/* OPENING */
.opening {
    position: fixed;
    width: 100%;
    height: 100%;
    background: #2e1a47;
    display: flex;
    justify-content: center;
    align-items: center;
    flex-direction: column;
    color: white;
}

.opening h1 {
    font-family: 'Great Vibes', cursive;
    font-size: 42px;
}

button {
    margin-top: 20px;
    padding: 12px 28px;
    border: none;
    border-radius: 25px;
    background: #b999ff;
    color: white;
    cursor: pointer;
}

/* MAIN */
.main {
    display: none;
    height: 100vh;
    justify-content: center;
    align-items: center;
}

.card {
    width: 330px;
    background: white;
    border-radius: 20px;
    padding: 25px;
    text-align: center;
    box-shadow: 0 10px 30px rgba(0,0,0,0.2);
}

/* TEXT */
.title {
    font-family: 'Great Vibes', cursive;
    font-size: 36px;
    color: #5a2ea6;
}

.photo img {
    width: 140px;
    height: 140px;
    border-radius: 15px;
    margin: 15px 0;
}

.name {
    font-weight: bold;
    color: #6a3cc9;
}

.message {
    font-size: 13px;
    line-height: 1.7;
    margin-top: 10px;
}

/* FLOWER */
.flower {
    position: absolute;
    top: -50px;
    font-size: 18px;
    animation: fall linear infinite;
    color: #caaaff;
}

@keyframes fall {
    to {
        transform: translateY(110vh);
    }
}
</style>
</head>

<body>

<!-- OPENING -->
<div class="opening" id="open">
    <h1>For Someone Special 💜</h1>
    <button onclick="playMusic()">Buka</button>
</div>

<!-- MAIN -->
<div class="main" id="main">
    <div class="card">

        <div class="title">Happy Semprotulation</div>

        <div class="photo">
            <img src="https://i.ibb.co/HfMmR3Fx/image.jpg">
        </div>

        <div class="name">WAHYU PRADIKA</div>

        <div class="message">
            Hari ini bukan sekadar tentang pencapaian,<br><br>
            tapi tentang perjalanan luar biasa yang akhirnya menemukan titik terangnya.<br><br>
            Kamu hebat, kamu kuat, dan kamu layak untuk semua ini ✨
        </div>

        <div style="margin-top:15px;font-size:12px;">
            Dari: <b>Nama Kamu</b>
        </div>

    </div>
</div>

<!-- AUDIO -->
<audio id="musik" loop>
    <source src="musik.mp3" type="audio/mpeg">
</audio>

<script>
function playMusic() {
    let audio = document.getElementById("musik");

    // tampilkan halaman
    document.getElementById("open").style.display = "none";
    document.getElementById("main").style.display = "flex";

    // PLAY WAJIB DI SINI (klik user)
    audio.volume = 0.5;

    audio.play().then(() => {
        console.log("Musik berhasil diputar");
    }).catch(() => {
        alert("Klik sekali lagi untuk memutar musik");
        document.body.onclick = function() {
            audio.play();
        }
    });
}

/* bunga jatuh */
for (let i = 0; i < 20; i++) {
    let f = document.createElement("div");
    f.className = "flower";
    f.innerHTML = "❀";
    f.style.left = Math.random()*100 + "vw";
    f.style.animationDuration = (5 + Math.random()*5) + "s";
    document.body.appendChild(f);
}
</script>

</body>
</html>
